<script type="module">
    // 1. I-import ang Firebase Libraries
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 2. NEW CLEAN SLATE CONFIG (100% Matched)
    const firebaseConfig = {
        apiKey: "AIzaSyBXs5CPYgUUWlwwnO99IObzlgyyglEP9Xg", // Ang bagong key mo
        authDomain: "goldchelle-logistics.firebaseapp.com",
        projectId: "goldchelle-logistics",
        storageBucket: "goldchelle-logistics.firebasestorage.app",
        messagingSenderId: "736631888684",
        appId: "1:736631888684:web:4cbb6daa5499a29c976a89",
        measurementId: "G-REJ40DV9E7"
    };

    // 3. Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 4. Login Logic
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const message = document.getElementById('message');
        
        message.innerText = "Checking credentials...";
        message.style.color = "#666";

        try {
            await signInWithEmailAndPassword(auth, email, password);
            message.innerText = "Login Successful!";
            message.style.color = "green";
            
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
            
        } catch (error) {
            console.error("Login Error:", error.code);
            
            if (error.code === 'auth/invalid-credential') {
                message.innerText = "Maling email o password.";
            } else if (error.code === 'auth/api-key-not-valid') {
                message.innerText = "API Key error. Siguraduhin na 'Don't restrict key' ito sa Google Cloud.";
            } else {
                message.innerText = "Error: " + error.code;
            }
            message.style.color = "red";
        }
    });
</script>
