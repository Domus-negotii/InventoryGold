<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // ETO ANG TAMANG CONFIG MULA SA SCREENSHOT MO
    const firebaseConfig = {
        apiKey: "AIzaSyDEEH7oZqXY8LQ1efOQ68xuCSdxDLmqsYw",
        authDomain: "goldchelle-logistics.firebaseapp.com",
        projectId: "goldchelle-logistics",
        storageBucket: "goldchelle-logistics.firebasestorage.app",
        messagingSenderId: "736631888684",
        appId: "1:736631888684:web:4cbb6daa5499a29c976a89",
        measurementId: "G-REJ40DV9E7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const message = document.getElementById('message');

        try {
            await signInWithEmailAndPassword(auth, email, password);
            alert("Success! Naka-login ka na, Architect.");
            window.location.href = "dashboard.html"; 
        } catch (error) {
            console.error(error.code);
            if (error.code === 'auth/invalid-credential') {
                message.innerText = "Maling email o password.";
            } else {
                message.innerText = "Error: " + error.message;
            }
        }
    });
</script>
