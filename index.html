<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goldchelle Logistics - Login</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #message { color: red; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login Portal</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p id="message"></p>
</div>

<script type="module">
    // 1. I-import ang Firebase Libraries
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 2. I-paste dito ang iyong Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyARb-3fZ9qaiqGslaO0d56QLPlFUgirFhY",
        authDomain: "goldchelle-logistics.firebaseapp.com",
        projectId: "goldchelle-logistics",
        storageBucket: "goldchelle-logistics.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    // 3. Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 4. Login Logic
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const message = document.getElementById('message');

        try {
            await signInWithEmailAndPassword(auth, email, password);
            alert("Success! Naka-login ka na.");
            // Dito mo ilalagay kung saan pupunta pagkatapos mag-login
            // window.location.href = "dashboard.html"; 
        } catch (error) {
            message.innerText = "Error: " + error.message;
        }
    });
</script>

</body>
</html>
